version: 2

models:
  - name: int_players__club_spells
    description: >
      Une ligne par transfert, reconstruite en période "joueur x club" : la période
      commence à la date du transfert et se termine à la date du transfert suivant
      du même joueur (`spell_end_date` nul si le joueur est toujours à ce club au
      dernier transfert connu).
    columns:
      - name: transfer_id
        description: Même clé que le transfert à l'origine du spell (relation 1:1).
        data_tests:
          - unique
          - not_null

  - name: int_transfers__performance_during_spell
    description: >
      Une ligne par transfert, agrégeant les statistiques de performance
      (`stg_transfermarkt__appearances`) du joueur pour le club acquéreur pendant
      toute la durée du spell qui suit ce transfert.
    columns:
      - name: transfer_id
        data_tests:
          - unique
          - not_null

  - name: int_transfers__market_value_at_spell_end
    description: >
      Une ligne par transfert, avec la valeur marchande connue la plus récente à la
      date de fin du spell (ou à la date du jour si le joueur est toujours au club).
      Absent si aucune valorisation n'existe avant cette date.
    columns:
      - name: transfer_id
        data_tests:
          - unique

  - name: int_transfers__club_elo_at_transfer
    description: >
      Une ligne par transfert, avec le rating ClubElo du club vendeur et du club
      acquéreur à la date du transfert (`clubelo_club_mapping`, cf.
      `ARCHITECTURE.md` décision 13). Nul des deux côtés où aucune correspondance
      n'existe — clubs hors Europe, ou non résolus par le mapping (~70% de
      couverture).
    columns:
      - name: transfer_id
        data_tests:
          - unique
          - not_null

  - name: int_wikipedia_transfers__value_trajectory
    description: >
      Pour chaque ligne de `fct_wikipedia_transfer`, résout le joueur (nom +
      présence d'une valorisation à ce club précis dans
      `stg_transfermarkt__player_valuations`) puis calcule sa valorisation la
      plus ancienne et la plus récente pendant son passage à ce club, avant la
      date du transfert. Matché sur `current_club_name`, pas `current_club_id` —
      ce dernier s'est révélé non fiable (toujours égal au club le plus récent
      du joueur, quelle que soit la date de la ligne) : voir `ARCHITECTURE.md`
      décision 15 pour le cas réel qui l'a révélé (Griezmann, une valorisation
      2010 à la Real Sociedad portant le `current_club_id` de l'Atlético Madrid).
    columns:
      - name: club_id
        data_tests:
          - not_null
