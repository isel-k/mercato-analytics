version: 2

models:
  - name: dim_player
    description: Une ligne par joueur.
    columns:
      - name: player_id
        data_tests:
          - unique
          - not_null
      - name: image_url
        description: Portrait du joueur (CDN Transfermarkt), pour l'affichage dashboard.

  - name: dim_club
    description: Une ligne par club.
    columns:
      - name: club_id
        data_tests:
          - unique
          - not_null
      - name: crest_url
        description: >
          Logo du club, construit depuis club_id via le pattern d'URL public du
          CDN Transfermarkt (`.../wappen/tiny/{club_id}.png`) — aucune colonne
          crest/logo native dans la source, aucune ingestion supplémentaire
          nécessaire.
      - name: current_elo
        description: >
          Rating ClubElo le plus récent connu pour ce club (pas "à une date
          donnée" — voir `int_transfers__club_elo_at_transfer` pour ça). Nul
          pour les clubs hors Europe ou non résolus par
          `clubelo_club_mapping` (~70% de couverture, cf. `ARCHITECTURE.md`
          décision 13) — à ne jamais lire comme "club faible".

  - name: fct_transfer
    description: >
      Une ligne par transfert, avec le ROI présenté en indicateurs distincts plutôt
      que fusionnés en un score unique pondéré : `roi_financier` (plus-value de
      valeur marchande pendant le spell rapportée au coût d'acquisition, non défini
      pour les transferts gratuits), `value_gained_absolute` (la même plus-value en
      valeur absolue, définie même à coût nul) et `cost_per_goal_contribution`
      (coût du transfert rapporté aux buts + passes décisives pendant le spell).
    columns:
      - name: transfer_id
        data_tests:
          - unique
          - not_null
      - name: player_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: from_club_id
        description: >
          Club vendeur. Peut référencer un club absent de `dim_club` : le
          référentiel `clubs` de Transfermarkt ne couvre que les clubs des
          compétitions suivies (pas les réserves, U19, clubs étrangers hors
          périmètre, ni les statuts "Without Club"/"Retired"/"Unknown") — limitation
          connue du dataset source, d'où le `warn` plutôt qu'un `error`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: to_club_id
        description: Club acquéreur. Même limitation de couverture que `from_club_id`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: roi_financier
        description: >
          (valeur marchande en fin de spell - valeur marchande à l'achat - montant
          payé) / montant payé. Un ratio n'a pas de sens à coût nul : nul si le
          montant du transfert est 0 ou inconnu (`null` dans la source). Le montant
          à 0 n'est **pas fiable à 100% comme "gratuit confirmé"** : le pipeline
          amont (`transformarkt-datasets`) parse le texte brut du fee et retombe sur
          0 pour tout ce qui n'est pas au format `€X.Xm` exact, y compris les prêts
          ("Loan fee: €X", "Loan") — cf. `ARCHITECTURE.md` décision 12. Voir
          `value_gained_absolute` pour une mesure qui reste définie à montant = 0.
      - name: value_gained_absolute
        description: >
          valeur marchande en fin de spell - valeur marchande à l'achat - montant
          payé, en euros. Une soustraction, pas un ratio : reste défini à montant = 0
          (gratuit, prêt, ou texte de fee non parsé en amont — cf. `roi_financier` et
          `ARCHITECTURE.md` décision 12), contrairement à `roi_financier`. Nul
          uniquement si le montant est inconnu ou si aucune valorisation n'est
          disponible en fin de spell.
      - name: cost_per_goal_contribution
        description: >
          Montant payé / (buts + passes décisives pendant le spell). Nul si aucun but
          ni passe décisive n'a été enregistré durant le spell.
      - name: from_club_elo
        description: >
          Rating ClubElo du club vendeur à la date du transfert (période contenant
          `transfer_date`, ou période la plus proche à défaut). Nul si le club
          vendeur n'est pas européen ou n'a pas de correspondance dans
          `clubelo_club_mapping` (~70% de couverture, cf. `ARCHITECTURE.md`).
      - name: to_club_elo
        description: Même logique que `from_club_elo`, pour le club acquéreur.
      - name: club_elo_delta
        description: >
          `to_club_elo - from_club_elo` : positif si le joueur rejoint un club plus
          fort selon ClubElo, négatif sinon. Nul si `from_club_elo` ou
          `to_club_elo` est nul.
      - name: seasons_played_during_spell
        description: >
          Nombre de saisons distinctes avec au moins une apparition pendant le
          spell. Ajouté pour ne pas juger un transfert uniquement sur
          `roi_financier` (défavorable par construction à un joueur qui vieillit
          au club) ou `cost_per_goal_contribution` (défavorable à un profil
          défensif/relayeur) — voir `ARCHITECTURE.md` décision 16.
      - name: cost_per_season
        description: >
          `transfer_fee / seasons_played_during_spell`. Nul si le joueur n'a joué
          aucune saison enregistrée pendant le spell. Complète
          `cost_per_goal_contribution` sans en dépendre — un joueur avec 0
          contribution mais 10 saisons a un `cost_per_season` très bas malgré un
          `cost_per_goal_contribution` non défini.
      - name: league_titles_during_spell
        description: >
          Nombre de titres de championnat remportés par le club acquéreur pendant
          que le joueur y était sous contrat (`int_transfers__titles_during_spell`),
          limité aux compétitions du seed `competition_champion_scope` — pas une
          couverture mondiale, voir `ARCHITECTURE.md` décision 16. Toujours défini
          (0 si aucun titre ou si aucune des compétitions suivies ne concerne ce
          club), jamais nul.
        data_tests:
          - not_null
      - name: cup_titles_during_spell
        description: Même logique que `league_titles_during_spell`, pour les coupes du seed (domestiques + Ligue des Champions/Europa/Conference).
        data_tests:
          - not_null

  - name: dim_team
    description: >
      Une ligne par équipe suivie par football-data.org (5 grands championnats +
      Ligue des champions). Référentiel distinct de `dim_club` (Transfermarkt) —
      pas de résolution d'identité entre les deux sources pour l'instant.
    columns:
      - name: team_id
        data_tests:
          - unique
          - not_null

  - name: fct_match
    description: Une ligne par match (calendrier et résultat), football-data.org.
    columns:
      - name: match_id
        data_tests:
          - unique
          - not_null
      - name: home_team_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: away_team_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id

  - name: fct_wikipedia_transfer
    description: >
      Une ligne par mouvement entrant/sortant récent pour un ensemble ciblé de
      grands clubs européens (voir `ARCHITECTURE.md` décision 14) — comble le trou
      de couverture trouvé dans `fct_transfer` pour ces clubs précisément (ex. le
      Real Madrid, sans transfert Transfermarkt enregistré depuis juillet 2024).
      Complémentaire à `fct_transfer`, pas fusionné dedans : reste une table à part
      même si le joueur est résolu (`player_id` via `int_wikipedia_transfers__value_trajectory`),
      car pas de spell/performance pour calculer les mêmes indicateurs de
      `fct_transfer`. `fee_amount` est une extraction best-effort depuis la prose
      Wikipedia — souvent nul même pour un vrai transfert payant, ne jamais le
      traiter comme "confirmé gratuit".
    columns:
      - name: club_id
        description: Club ciblé (`dim_club.club_id`) — pas forcément le club acquéreur, cf. `direction`.
        data_tests:
          - not_null
      - name: direction
        description: "'in' si le club ciblé est l'acquéreur, 'out' s'il est le vendeur."
        data_tests:
          - accepted_values:
              arguments:
                values: ["in", "out"]
      - name: value_at_arrival
        description: >
          Valorisation connue la plus ancienne du joueur pendant qu'il était à ce
          club précis, avant la date du transfert (`stg_transfermarkt__player_valuations`,
          filtré sur `current_club_name` — pas `current_club_id`, qui s'est révélé
          non fiable dans cette source, cf. `ARCHITECTURE.md` décision 15). Sert de
          proxy pour "valeur à l'arrivée" quand le transfert d'acquisition original
          n'existe pas dans `fct_transfer` (le cas pour la grande majorité de ces
          joueurs).
      - name: value_at_departure
        description: Même logique que `value_at_arrival`, valorisation connue la plus récente avant la date du transfert.
      - name: value_gained_during_tenure
        description: >
          `value_at_departure - value_at_arrival`, uniquement pour `direction = 'out'` :
          plus-value (ou perte) de valeur marchande pendant tout le passage au club
          vendeur, indépendamment du prix d'acquisition d'origine (souvent inconnu).
      - name: fee_vs_last_valuation
        description: >
          `fee_amount - value_at_departure`, uniquement pour `direction = 'out'` :
          le club vendeur a-t-il vendu au-dessus ou en-dessous de la dernière
          valorisation connue du joueur ? Nul si l'un des deux manque.
