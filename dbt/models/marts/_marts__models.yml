version: 2

models:
  - name: dim_player
    description: Une ligne par joueur.
    columns:
      - name: player_id
        data_tests:
          - unique
          - not_null

  - name: dim_club
    description: Une ligne par club.
    columns:
      - name: club_id
        data_tests:
          - unique
          - not_null

  - name: fct_transfer
    description: >
      Une ligne par transfert, avec le ROI présenté en deux indicateurs distincts :
      `roi_financier` (plus-value de valeur marchande pendant le spell rapportée au
      coût d'acquisition) et `cost_per_goal_contribution` (coût du transfert rapporté
      aux buts + passes décisives pendant le spell). Les deux sont volontairement
      laissés séparés plutôt que fusionnés en un score unique pondéré.
    columns:
      - name: transfer_id
        data_tests:
          - unique
          - not_null
      - name: player_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: from_club_id
        description: >
          Club vendeur. Peut référencer un club absent de `dim_club` : le
          référentiel `clubs` de Transfermarkt ne couvre que les clubs des
          compétitions suivies (pas les réserves, U19, clubs étrangers hors
          périmètre, ni les statuts "Without Club"/"Retired"/"Unknown") — limitation
          connue du dataset source, d'où le `warn` plutôt qu'un `error`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: to_club_id
        description: Club acquéreur. Même limitation de couverture que `from_club_id`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: roi_financier
        description: >
          (valeur marchande en fin de spell - valeur marchande à l'achat - montant
          payé) / montant payé. Nul si le montant du transfert est nul ou inconnu
          (prêt, transfert libre), ou si aucune valorisation n'est disponible en fin
          de spell.
      - name: cost_per_goal_contribution
        description: >
          Montant payé / (buts + passes décisives pendant le spell). Nul si aucun but
          ni passe décisive n'a été enregistré durant le spell.
