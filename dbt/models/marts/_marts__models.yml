version: 2

models:
  - name: dim_player
    description: Une ligne par joueur.
    columns:
      - name: player_id
        data_tests:
          - unique
          - not_null
      - name: image_url
        description: Portrait du joueur (CDN Transfermarkt), pour l'affichage dashboard.

  - name: dim_club
    description: Une ligne par club.
    columns:
      - name: club_id
        data_tests:
          - unique
          - not_null
      - name: crest_url
        description: >
          Logo du club, construit depuis club_id via le pattern d'URL public du
          CDN Transfermarkt (`.../wappen/tiny/{club_id}.png`) — aucune colonne
          crest/logo native dans la source, aucune ingestion supplémentaire
          nécessaire.

  - name: fct_transfer
    description: >
      Une ligne par transfert, avec le ROI présenté en indicateurs distincts plutôt
      que fusionnés en un score unique pondéré : `roi_financier` (plus-value de
      valeur marchande pendant le spell rapportée au coût d'acquisition, non défini
      pour les transferts gratuits), `value_gained_absolute` (la même plus-value en
      valeur absolue, définie même à coût nul) et `cost_per_goal_contribution`
      (coût du transfert rapporté aux buts + passes décisives pendant le spell).
    columns:
      - name: transfer_id
        data_tests:
          - unique
          - not_null
      - name: player_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_player')
                field: player_id
      - name: from_club_id
        description: >
          Club vendeur. Peut référencer un club absent de `dim_club` : le
          référentiel `clubs` de Transfermarkt ne couvre que les clubs des
          compétitions suivies (pas les réserves, U19, clubs étrangers hors
          périmètre, ni les statuts "Without Club"/"Retired"/"Unknown") — limitation
          connue du dataset source, d'où le `warn` plutôt qu'un `error`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: to_club_id
        description: Club acquéreur. Même limitation de couverture que `from_club_id`.
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_club')
                field: club_id
              config:
                severity: warn
      - name: roi_financier
        description: >
          (valeur marchande en fin de spell - valeur marchande à l'achat - montant
          payé) / montant payé. Un ratio n'a pas de sens à coût nul : nul si le
          montant du transfert est 0 (transfert gratuit confirmé) ou inconnu
          (`null` dans la source — Transfermarkt distingue les deux, cf.
          `value_gained_absolute` pour une mesure qui couvre aussi les transferts
          gratuits), ou si aucune valorisation n'est disponible en fin de spell.
      - name: value_gained_absolute
        description: >
          valeur marchande en fin de spell - valeur marchande à l'achat - montant
          payé, en euros. Une soustraction, pas un ratio : reste défini pour les
          transferts gratuits (montant = 0), contrairement à `roi_financier`. Nul
          uniquement si le montant est inconnu ou si aucune valorisation n'est
          disponible en fin de spell.
      - name: cost_per_goal_contribution
        description: >
          Montant payé / (buts + passes décisives pendant le spell). Nul si aucun but
          ni passe décisive n'a été enregistré durant le spell.

  - name: dim_team
    description: >
      Une ligne par équipe suivie par football-data.org (5 grands championnats +
      Ligue des champions). Référentiel distinct de `dim_club` (Transfermarkt) —
      pas de résolution d'identité entre les deux sources pour l'instant.
    columns:
      - name: team_id
        data_tests:
          - unique
          - not_null

  - name: fct_match
    description: Une ligne par match (calendrier et résultat), football-data.org.
    columns:
      - name: match_id
        data_tests:
          - unique
          - not_null
      - name: home_team_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
      - name: away_team_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_team')
                field: team_id
