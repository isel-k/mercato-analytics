version: 2

seeds:
  - name: clubelo_club_mapping
    description: >
      Jointure `dim_club.club_id` ↔ nom de club ClubElo, résolue par correspondance
      approximative (rapidfuzz `token_set_ratio` sur le nom normalisé, filtré par
      pays via `stg_transfermarkt__competitions`) puis corrigée manuellement pour
      les clubs mal appariés par l'algorithme (ex. abréviations comme "Man City",
      noms composés comme "Mönchengladbach", homonymes comme "Real" vs "Atlético").
      Ne couvre que ~70% de `dim_club` : ClubElo ne suit que le football européen,
      et l'algorithme n'atteint pas 100% de rappel même sur le sous-ensemble
      européen (seuil de confiance à 0.75 pour limiter les faux positifs plutôt que
      maximiser la couverture). Voir `ARCHITECTURE.md` pour la méthode complète.
    config:
      column_types:
        club_id: integer
    columns:
      - name: club_id
        description: Référence vers `dim_club.club_id`.
        data_tests:
          - unique
          - not_null
      - name: clubelo_club
        description: Nom du club tel que publié par ClubElo — clé de jointure vers `stg_clubelo__ratings.clubelo_club`.
        data_tests:
          - not_null
      - name: clubelo_country
        description: Code pays ClubElo (3 lettres) — clé de jointure vers `stg_clubelo__ratings.clubelo_country`.
        data_tests:
          - not_null

  - name: competition_champion_scope
    description: >
      Allowlist manuelle et vérifiée des compétitions pour lesquelles un champion
      de saison peut être dérivé sans ambiguïté depuis `games`/`club_games` — pas
      une couverture mondiale. Chaque ligne n'a été ajoutée qu'après vérification
      directe (cf. `ARCHITECTURE.md` décision 16) : pour `cup_final`, qu'un match
      par saison porte `round = 'Final'` (y compris les cas décidés aux tirs au
      but — Transfermarkt inclut déjà les buts de la séance dans le score, ex.
      finale C1 2016 Real Madrid 6:4 Atlético) ; pour `league_table`, que le
      champion est bien décidé par le classement final et non par un playoff de
      fin de saison (la Belgique, qui a un tel playoff, en est explicitement
      exclue).
    config:
      column_types:
        competition_id: varchar
    columns:
      - name: competition_id
        description: Référence vers `stg_transfermarkt__competitions.competition_id`.
        data_tests:
          - unique
          - not_null
      - name: champion_method
        description: >
          `league_table` (dernière journée de championnat, `own_position = 1`) ou
          `cup_final` (match `round = 'Final'`, `is_win = true`).
        data_tests:
          - accepted_values:
              arguments:
                values: ["league_table", "cup_final"]
